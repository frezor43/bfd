<!DOCTYPE html>
<html lang="da">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <title>BFD – vælg fællesskab</title>

    <meta
        name="description"
        content="BFD er indgangen til Bridgefællesskabet Danmark og Borgere for Dialog."
    >

    <link rel="icon" type="image/png" href="logo/bfd_logo_512.png">
    <link rel="stylesheet" href="style.css">
</head>

<body class="portal-page">

    <main class="portal">

        <header class="portal-header">
            <img
                src="logo/bfd_logo_512.png"
                alt="BFD"
                class="portal-logo"
            >

            <h1>Velkommen til BFD</h1>

            <p>Vælg det fællesskab, du vil besøge.</p>
        </header>

        <section class="portal-choices">

            <a href="bridge.html" class="portal-card">
                <img
                    src="logo/bfd_logo_512.png"
                    alt=""
                    class="portal-card-logo"
                >

                <div>
                    <h2>Bridgefællesskabet Danmark</h2>

                    <p>
                        Bridge, læring og fællesskab i trygge lokale rammer.
                    </p>

                    <span class="portal-button">
                        Gå til Bridgefællesskabet
                    </span>
                </div>
            </a>

            <a href="login.html" class="portal-card">
                <div class="dialog-symbol" aria-hidden="true">
                    BFD
                </div>

                <div>
                    <h2>Borgere for Dialog</h2>

                    <p>
                        Møder, oplæg, dialog og fælles initiativer.
                    </p>

                    <span class="portal-button">
                        Log ind
                    </span>
                </div>
            </a>

        </section>

    </main>

    <footer class="portal-footer">
        <p>© 2026 BFD – bfd.nu</p>
    </footer>

</body>
</html>
